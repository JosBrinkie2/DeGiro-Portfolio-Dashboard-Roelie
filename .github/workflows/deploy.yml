name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: degiro-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: degiro-dashboard

      - name: Build
        run: npm run build
        working-directory: degiro-dashboard
        env:
          # Optional Cloudflare Worker proxy URL. Set under
          # Settings → Secrets and variables → Actions → Variables.
          # If unset, the app falls back to public CORS proxies.
          VITE_PROXY_BASE: ${{ vars.VITE_PROXY_BASE }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: degiro-dashboard/dist
